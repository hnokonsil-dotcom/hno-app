/* ── IndexedDB cache for offline data ─────────────────────────────────── */
var DB_NAME = "hno_app_cache";
var DB_VERSION = 1;

function openCacheDB() {
  return new Promise(function(resolve, reject) {
    var req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = function(e) {
      var db = e.target.result;
      if (!db.objectStoreNames.contains("data")) {
        db.createObjectStore("data");
      }
    };
    req.onsuccess = function(e) { resolve(e.target.result); };
    req.onerror = function(e) { reject(e.target.error); };
  });
}

function cacheSet(key, value) {
  return openCacheDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction("data", "readwrite");
      tx.objectStore("data").put(value, key);
      tx.oncomplete = function() { resolve(); };
      tx.onerror = function(e) { reject(e.target.error); };
    });
  });
}

function cacheGet(key) {
  return openCacheDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction("data", "readonly");
      var req = tx.objectStore("data").get(key);
      req.onsuccess = function() { resolve(req.result); };
      req.onerror = function(e) { reject(e.target.error); };
    });
  });
}

/* ── Google OAuth / Gmail API ────────────────────────────────────────── */

function initGmailTokenClient(onTokenCallback) {
  if (typeof google === "undefined" || !google.accounts) return null;
  _tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GMAIL_CLIENT_ID,
    scope: GMAIL_SCOPES,
    callback: function(resp) {
      if (resp.error) { onTokenCallback(null, resp.error); return; }
      _gmailToken = resp.access_token;
      onTokenCallback(resp.access_token, null);
    },
  });
  return _tokenClient;
}

function gmailSignIn() {
  if (_tokenClient) _tokenClient.requestAccessToken();
}

function gmailSignOut() {
  if (_gmailToken) {
    google.accounts.oauth2.revoke(_gmailToken);
    _gmailToken = null;
  }
}

function gmailFetch(endpoint) {
  return fetch("https://gmail.googleapis.com/gmail/v1/users/me/" + endpoint, {
    headers: { Authorization: "Bearer " + _gmailToken }
  }).then(function(r) { return r.json(); });
}

function base64Decode(str) {
  try {
    var s = str.replace(/-/g, "+").replace(/_/g, "/");
    return decodeURIComponent(atob(s).split("").map(function(c) {
      return "%" + ("00" + c.charCodeAt(0).toString(16)).slice(-2);
    }).join(""));
  } catch(e) { return atob(str.replace(/-/g, "+").replace(/_/g, "/")); }
}

function getHeader(headers, name) {
  var h = headers.find(function(x) { return x.name.toLowerCase() === name.toLowerCase(); });
  return h ? h.value : "";
}

function extractPlainBody(payload) {
  if (payload.mimeType === "text/plain" && payload.body && payload.body.data) {
    return base64Decode(payload.body.data);
  }
  if (payload.parts) {
    for (var i = 0; i < payload.parts.length; i++) {
      var result = extractPlainBody(payload.parts[i]);
      if (result) return result;
    }
  }
  if (payload.mimeType === "text/html" && payload.body && payload.body.data) {
    var html = base64Decode(payload.body.data);
    var tmp = document.createElement("div");
    tmp.innerHTML = html;
    return tmp.textContent || tmp.innerText || "";
  }
  return "";
}

function extractAttachmentNames(payload) {
  var names = [];
  function walk(part) {
    if (part.filename && part.filename.toLowerCase().endsWith(".pdf")) {
      names.push(part.filename);
    }
    if (part.parts) part.parts.forEach(walk);
  }
  walk(payload);
  return names;
}

function fetchKonsilEmails() {
  var query = "subject:(Konsil OR konsil OR Anfrage OR anfrage OR Konsilanfrage OR HNO) -category:promotions -category:social";
  return gmailFetch("messages?q=" + encodeURIComponent(query) + "&maxResults=50")
    .then(function(listRes) {
      if (!listRes.messages || listRes.messages.length === 0) return [];
      var fetches = listRes.messages.map(function(m) {
        return gmailFetch("messages/" + m.id + "?format=full");
      });
      return Promise.all(fetches);
    })
    .then(function(msgs) {
      return msgs.filter(function(msg) { return msg && msg.payload; }).map(function(msg) {
        var headers = (msg.payload && msg.payload.headers) || [];
        var from = getHeader(headers, "From") || "";
        var subject = getHeader(headers, "Subject") || "";
        var date = getHeader(headers, "Date") || "";
        var replyTo = getHeader(headers, "Reply-To") || from;
        var body = msg.payload ? extractPlainBody(msg.payload) : "";
        var pdfs = msg.payload ? extractAttachmentNames(msg.payload) : [];
        var fromName = from.replace(/<[^>]+>/, "").trim();
        var fromAddr = (from.match(/<([^>]+)>/) || [null, from])[1];
        var patientMatch = body.match(/Patient[:\s]+([^\n,]+)/i) || subject.match(/Patient[:\s]+([^\n,]+)/i);
        return {
          id: msg.id,
          datum: date,
          von: fromName,
          vonAddr: fromAddr,
          replyTo: replyTo.replace(/<[^>]+>/, "").trim().match(/<([^>]+)>/) ? (replyTo.match(/<([^>]+)>/) || [null, replyTo])[1] : replyTo,
          betreff: subject,
          patient: patientMatch ? patientMatch[1].trim() : "",
          body: body.substring(0, 500),
          pdfs: pdfs,
          status: "Offen",
          rechnungNr: "",
          replySent: false,
          gmailId: msg.id,
          threadId: msg.threadId,
        };
      });
    });
}

function sendGmailReply(threadId, to, subject, bodyText) {
  var raw = "To: " + to + "\r\n" +
    "Subject: Re: " + subject + "\r\n" +
    "Content-Type: text/plain; charset=utf-8\r\n\r\n" +
    bodyText;
  var encoded = btoa(unescape(encodeURIComponent(raw))).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
  return fetch("https://gmail.googleapis.com/gmail/v1/users/me/messages/send", {
    method: "POST",
    headers: {
      Authorization: "Bearer " + _gmailToken,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ raw: encoded, threadId: threadId })
  }).then(function(r) { return r.json(); });
}

/* ═══════════════════════════════════════════════════════════════════════════
   TAB 1: GOAe (reads goae_codes.xlsx OR uses built-in defaults)
   ═══════════════════════════════════════════════════════════════════════════ */

function parseGoaeXlsx(arrayBuffer) {
  var wb = XLSX.read(arrayBuffer, { type:"array" });
  // Try "GOAe Codes" sheet, fall back to first sheet
  var wsName = wb.SheetNames.find(function(n){ return n.toLowerCase().includes("go\u00e4") || n.toLowerCase().includes("goae") || n.toLowerCase().includes("code"); }) || wb.SheetNames[0];
  var ws = wb.Sheets[wsName];
  var rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:"" });
  // Header: Code, Kategorie, Beschreibung, Gebuehr, Punkte
  var data = [];
  for (var i = 1; i < rows.length; i++) {
    var r = rows[i];
    if (!r[0] && !r[2]) continue;
    data.push({
      code: String(r[0] || "").trim(),
      cat: String(r[1] || "").trim(),
      desc: String(r[2] || "").trim(),
      fee: parseFloat(r[3]) || 0,
    });
  }
  return data;
}

function GoaeTab() {
  var _s1 = useState(DEFAULT_GOAE), codes = _s1[0], setCodes = _s1[1];
  var _s2 = useState(false), xlsxLoaded = _s2[0], setXlsxLoaded = _s2[1];
  var _s3 = useState(""), q = _s3[0], setQ = _s3[1];
  var _s4 = useState("2.3"), fac = _s4[0], setFac = _s4[1];
  var _s5 = useState(null), err = _s5[0], setErr = _s5[1];
  var fileRef = useRef(null);

  function handleFile(e) {
    var file = e.target.files[0];
    if (!file) return;
    setErr(null);
    var reader = new FileReader();
    reader.onload = function(evt) {
      try {
        var parsed = parseGoaeXlsx(new Uint8Array(evt.target.result));
        if (parsed.length > 0) {
          setCodes(parsed);
          setXlsxLoaded(true);
        } else {
          setErr("Keine GO\u00c4-Codes in der Datei gefunden.");
        }
      } catch(ex) {
        setErr("Datei konnte nicht gelesen werden: " + ex.message);
      }
    };
    reader.readAsArrayBuffer(file);
    e.target.value = "";
  }

  var results = q.trim() === "" ? codes : codes.filter(function(g) {
    var ql = q.toLowerCase();
    return g.code.toLowerCase().startsWith(ql) || g.desc.toLowerCase().includes(ql) || g.cat.toLowerCase().includes(ql);
  });

  var f = parseFloat(fac) || 1.0;

  return (
    <div style={S.tab}>
      <input type="file" accept=".xlsx,.xls" ref={fileRef} style={{ display:"none" }} onChange={handleFile} />

      {/* Load xlsx hint */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
        <span style={{ fontSize:12, color:C.muted }}>
          {xlsxLoaded ? "\u2713 GO\u00c4-Tabelle geladen" : "Standard-Codes (bearbeitbar per xlsx)"}
        </span>
        <button onClick={function(){fileRef.current.click()}} style={{ background:"none", border:"none", fontSize:12, color:C.accent, cursor:"pointer", fontWeight:500 }}>
          {xlsxLoaded ? "\u21bb Neu laden" : "\u21e7 goae_codes.xlsx laden"}
        </button>
      </div>
      {err && <div style={S.errBox}>{err}</div>}

      {/* Search */}
      <div style={S.searchWrap}>
        <span style={S.searchIcon}>{"\u2315"}</span>
        <input style={S.searchInput} placeholder="Code, Stichwort oder Kategorie\u2026" value={q} onChange={function(e){setQ(e.target.value)}} />
        {q && <button style={S.clearBtn} onClick={function(){setQ("")}}>{"\u2715"}</button>}
      </div>

      {/* Factor */}
      <div style={S.facRow}>
        {["1.0","1.8","2.3","3.5"].map(function(fv) {
          return <button key={fv} onClick={function(){setFac(fv)}} style={Object.assign({}, S.facBtn, fac===fv ? S.facActive : {})}>{fv+"\u00d7"}</button>;
        })}
      </div>

      {/* List */}
      <div style={S.list}>
        {results.map(function(g, idx) {
          var amount = g.fee * f;
          return (
            <div key={g.code+"-"+idx} style={{ background:C.surf, borderRadius:12, padding:"12px 14px", borderLeft:"3px solid "+C.accent }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
                <span style={{ fontFamily:"'Syne',sans-serif", fontWeight:700, fontSize:13, color:C.navy }}>{"\u00a7 "+g.code}</span>
                <span style={{ fontSize:11, background:C.bg, color:C.muted, padding:"2px 8px", borderRadius:20, fontWeight:500 }}>{g.cat}</span>
              </div>
              <div style={{ fontSize:14, lineHeight:1.4, marginBottom:8 }}>{g.desc}</div>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <span style={{ fontSize:12, color:C.muted }}>{fmtEuro(g.fee)+" \u00d7 "+fac}</span>
                <span style={{ fontFamily:"'Syne',sans-serif", fontSize:16, fontWeight:700, color:C.navy }}>{fmtEuro(amount)}</span>
              </div>
            </div>
          );
        })}
        {results.length === 0 && <div style={S.empty}>{"Keine Treffer f\u00fcr \u201e"+q+"\u201c"}</div>}
      </div>
    </div>
  );

function parsePatientenXlsx(ab) {

    if (q.trim()) {
      var ql = q.toLowerCase();
      return (a.patient||"").toLowerCase().includes(ql) || (a.betreff||"").toLowerCase().includes(ql) || (a.von||"").toLowerCase().includes(ql);
    }
    return true;
  });

  var countOffen = anfragen.filter(function(a){return a.status==="Offen"}).length;
  var countErledigt = anfragen.filter(function(a){return a.status==="Erledigt"}).length;

  if (!loaded) {
    return (
      <div style={S.tab}>
        <input type="file" accept=".json" ref={fileRef} style={{ display:"none" }} onChange={handleFile} />
        <div style={{ textAlign:"center", padding:"40px 20px" }}>
          <div style={{ fontSize:48, marginBottom:16 }}>{"\u2709"}</div>
          <div style={{ fontFamily:"'Syne',sans-serif", fontSize:18, fontWeight:700, color:C.navy, marginBottom:8 }}>{"Konsilanfragen"}</div>

          {/* Gmail sign-in button */}
          <div style={{ marginBottom:20 }}>
            <div style={{ fontSize:14, color:C.muted, lineHeight:1.6, marginBottom:16 }}>
              {"Melde dich mit Gmail an, um Konsilanfragen direkt abzurufen und zu beantworten."}
            </div>
            <button
              style={Object.assign({}, S.primaryBtn, { background:"#4285F4", display:"flex", alignItems:"center", justifyContent:"center", gap:10 })}
              onClick={handleGmailSignIn}
              disabled={gmailLoading}>
              <span style={{ fontSize:18 }}>{"\ud83d\udce7"}</span>
              {gmailLoading ? "Wird geladen\u2026" : "Mit Gmail anmelden"}
            </button>
          </div>

          {/* Divider */}
          <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:20 }}>
            <div style={{ flex:1, height:1, background:C.border }}></div>
            <span style={{ fontSize:12, color:C.muted }}>{"oder"}</span>
            <div style={{ flex:1, height:1, background:C.border }}></div>
          </div>

          {/* File fallback */}
          <div style={{ fontSize:13, color:C.muted, lineHeight:1.6, marginBottom:12 }}>
            {"Alternativ: "}
            <strong>{"email_requests.json"}</strong>
            {" aus dem Schmieder-Ordner laden."}
          </div>
          <button style={Object.assign({}, S.primaryBtn, { background:C.surf, color:C.navy, border:"1px solid "+C.border })} onClick={function(){fileRef.current.click()}}>{"Datei ausw\u00e4hlen"}</button>
          {error && <div style={S.errBox}>{error}</div>}
        </div>
      </div>
    );
  }

  return (
    <div style={S.tab}>
      <input type="file" accept=".json" ref={fileRef} style={{ display:"none" }} onChange={handleFile} />

      {/* Summary */}
      <div style={Object.assign({}, S.card, { marginBottom:12 })}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div style={{ display:"flex", gap:16, fontSize:13, color:C.muted }}>
            <span>{"\u2709 "+anfragen.length+" Anfragen"}</span>
            <span style={{ color:C.orange }}>{countOffen+" offen"}</span>
            <span style={{ color:C.green }}>{countErledigt+" erledigt"}</span>
          </div>
          {gmailConnected && <span style={{ fontSize:11, color:C.green, fontWeight:500 }}>{"\u2713 Gmail"}</span>}
        </div>
      </div>

      {/* Search */}
      <div style={S.searchWrap}>
        <span style={S.searchIcon}>{"\u2315"}</span>
        <input style={S.searchInput} placeholder="Patient, Betreff, Absender\u2026" value={q} onChange={function(e){setQ(e.target.value)}} />
        {q && <button style={S.clearBtn} onClick={function(){setQ("")}}>{"\u2715"}</button>}
      </div>

      {/* Filter + reload */}
      <div style={{ display:"flex", gap:8, marginBottom:10, alignItems:"center" }}>
        {[{id:"alle",label:"Alle"},{id:"offen",label:"Offen"},{id:"erledigt",label:"Erledigt"}].map(function(f) {
          return <button key={f.id} onClick={function(){setFilter(f.id)}} style={Object.assign({}, S.facBtn, filter===f.id ? S.facActive : {}, { fontSize:12, padding:"6px 0" })}>{f.label}</button>;
        })}
        <button onClick={gmailConnected ? handleGmailRefresh : function(){fileRef.current.click()}} style={{ background:"none", border:"none", fontSize:14, color:C.accent, cursor:"pointer", flexShrink:0 }}>{gmailLoading ? "\u231b" : "\u21bb"}</button>
      </div>

      {error && <div style={S.errBox}>{error}</div>}

      {/* List */}
      <div style={S.list}>
        {filtered.map(function(a, idx) {
          var sc = anfStatusColor(a.status);
          var open = expanded === idx;
          var isSending = sendingReply === (a.gmailId || a.id);
          var justSent = replySuccess === (a.gmailId || a.id);
          return (
            <div key={a.gmailId || idx} style={Object.assign({}, S.card, { borderLeft:"3px solid "+(a.status==="Offen"?C.orange:C.green), padding:"12px 14px" })}>
              <div style={S.cardHead} onClick={function(){setExpanded(open?null:idx)}}>
                <div style={{ flex:1 }}>
                  <div style={S.pName}>{a.patient || a.betreff}</div>
                  <div style={S.pSub}>
                    {fmtDate(a.datum)+" \u00b7 "+a.von}
                    {a.rechnungNr ? " \u00b7 Rechnung "+a.rechnungNr : ""}
                  </div>
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                  {a.replySent && <span style={{ fontSize:11, color:C.green }}>{"\u2713"}</span>}
                  <span style={Object.assign({}, S.badge, { background:sc.bg, color:sc.fg, marginBottom:0, marginRight:0, fontSize:11 })}>{a.status}</span>
                  <span style={{ fontSize:12, color:"#94A3B8" }}>{open?"\u25b2":"\u25bc"}</span>
                </div>
              </div>
              {open && (
                <div style={S.cardBody}>
                  <div style={{ fontSize:12, color:C.muted, marginBottom:4 }}>
                    <strong>{"Betreff: "}</strong>{a.betreff}
                  </div>
                  <div style={{ fontSize:12, color:C.muted, marginBottom:8 }}>
                    <strong>{"Von: "}</strong>{a.von}{a.vonAddr !== a.von ? " <"+a.vonAddr+">" : ""}
                  </div>
                  {a.pdfs && a.pdfs.length > 0 && (
                    <div style={{ display:"flex", flexWrap:"wrap", gap:4, marginBottom:8 }}>
                      {a.pdfs.map(function(p,i){
                        return <span key={i} style={{ fontSize:11, background:C.bg, color:C.navy, padding:"2px 8px", borderRadius:8 }}>{"\ud83d\udcc4 "+p}</span>;
                      })}
                    </div>
                  )}
                  {a.body && (
                    <div style={{ background:C.bg, borderRadius:8, padding:10, fontSize:13, color:C.txt, lineHeight:1.5, whiteSpace:"pre-wrap", maxHeight:200, overflowY:"auto" }}>
                      {a.body}
                    </div>
                  )}
                  {a.replySent && <div style={Object.assign({}, S.badge, { background:"#D1FAE5", color:"#065F46", marginTop:8 })}>{"\u2713 Best\u00e4tigung gesendet"}</div>}
                  {justSent && <div style={Object.assign({}, S.badge, { background:"#D1FAE5", color:"#065F46", marginTop:8 })}>{"\u2713 Antwort gesendet!"}</div>}

                  {/* Quick reply actions */}
                  <div style={{ display:"flex", flexDirection:"column", gap:8, marginTop:10 }}>
                    {gmailConnected && a.threadId ? (
                      <button style={Object.assign({}, S.aBtn, S.aBtnSuccess, { opacity: isSending ? 0.6 : 1 })}
                        onClick={function(){ handleGmailReply(a); }}
                        disabled={isSending || a.replySent}>
                        {isSending ? "\u231b Wird gesendet\u2026" : a.replySent ? "\u2713 Gesendet" : "\u2709 Direkt antworten (Gmail)"}
                      </button>
                    ) : (
                      <button style={Object.assign({}, S.aBtn, S.aBtnPrimary)}
                        onClick={function(){
                          var subject = encodeURIComponent("Re: " + a.betreff);
                          var body = encodeURIComponent(REPLY_TEXT);
                          var to = encodeURIComponent(a.replyTo || a.vonAddr);
                          window.location.href = "mailto:"+to+"?subject="+subject+"&body="+body;
                        }}>
                        {"\u2709  Antworten"}
                      </button>
                    )}
                  </div>
                </div>
              )}
            </div>
          );
        })}
        {filtered.length === 0 && <div style={S.empty}>{"Keine Anfragen gefunden."}</div>}
      </div>

      <div style={S.privacy}><div style={S.privacyTxt}>{gmailConnected ? "\ud83d\udd12 Gmail-Zugriff nur im Browser \u2014 kein Server" : "\ud83d\udd12 Alle Daten lokal \u2014 keine \u00dcbertragung an Dritte"}</div></div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   Navigation + App
   ═══════════════════════════════════════════════════════════════════════════ */

function Nav(props) {
  var tab = props.tab, set = props.set, anfragenCount = props.anfragenCount || 0;
  var items = [
    { id:"goae",       icon:"\u2695",         label:"GO\u00c4"       },
    { id:"rechnungen", icon:"\ud83d\udccb",   label:"Rechnungen"     },
    { id:"anfragen",   icon:"\u2709",         label:"Anfragen"       },
  ];
  return (
    <nav style={S.nav}>
      {items.map(function(it) {
        return (
          <button key={it.id} onClick={function(){set(it.id)}} style={S.navBtn}>
            <span style={Object.assign({}, S.navIcon, { color: tab===it.id ? C.navy : "#94A3B8" })}>{it.icon}</span>
            <span style={Object.assign({}, S.navLbl, { color: tab===it.id ? C.navy : "#94A3B8", fontWeight: tab===it.id ? 600 : 400 })}>{it.label}</span>
            {tab===it.id && <div style={S.navDot} />}
          </button>
        );
      })}
    </nav>
  );
}

function App() {
  var _s = useState("goae"), tab = _s[0], setTab = _s[1];
  var labels = { goae:"GO\u00c4 Nachschlagen", rechnungen:"Rechnungen", anfragen:"Konsilanfragen" };
  return (
    <div style={S.app}>
      <header style={S.hdr}>
        <div style={S.hdrIcon}>{"\u2695"}</div>
        <div>
          <div style={S.hdrTitle}>{"Stefan Demers"}</div>
          <div style={S.hdrSub}>{"Facharzt für HNO-Heilkunde"}</div>
        </div>
      </header>
      {tab==="goae"       && <GoaeTab />}
      {tab==="rechnungen" && <RechnungenTab />}
      {tab==="anfragen"   && <AnfragenTab />}
      <Nav tab={tab} set={setTab} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
